<!DOCTYPE html>
<html>
    <head>
        <title>LOGIN PAGE</title>
        <style>
            body{
                background: url("/logo.png");
                background-repeat: no-repeat;
                background-size: cover;
                background-position: center;
                min-height: 100vh;
            }
            main{

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                border: none;
            
            }
            .div{
                border: 2px solid black;
                padding: 15px;      
                margin-top: 100px;
                border-radius: 15px;
                background-color: rgb(254, 197, 199);
                width: fit-content;
                
            }
            .parent{
                display: grid;
                grid-template-columns:450px 450px;
                
            }
            
            table{
                border-spacing: 12px 12px;
                
            }p{
                text-align: center;
               
            }h1{
                color: rgb(156, 55, 225);
                text-align: center;
            }
        
  
        </style>
    </head>
    <body>
        <main>
            <section class="div">
                <h1>>WELCOME TO LOGIN PAGE</h1>
                <article class="parent">
                    <video autoplay loop muted playsinline width="350px" height="350px" style="margin-right: 80px;">
                        <source src="/logo2.mp4" type="video/mp4">
                    </video>
    
                    <form action="/login" method="post" style="margin-top: 80px;">
                        <table>
                            <tr>
                                <td style="font-size: 25px;">Email_ID</td>
                                <td colspan="2"><input type="text" name="l_email" placeholder="Enter eamil"  required style="width: 30vh; height:27px"></td>
                            </tr>
                            <tr>
                                <td style="font-size: 25px;">Password</td>
                                <td colspan="2"><input type="password" name="l_pass" required style="width: 30vh; height:27px"></td>
                            </tr>
                            <tr>
                                <td></td>
                                <td><input type="submit" value="SUBMIT" style="height:30px; background-color: green;"></td>
                                <td><input type="reset"  value="RESET" style="height:30px; background-color: red;"></td>
                            </tr>
                        </table>
                    </form>
                </article>
                <hr>
                <p>Don't have an accont? <a href="/">Sign Up</a></p>
            </section>
        </main>
    </body>
</html>
