<!DOCTYPE html>
<html>
    <head>
        <title>LOGIN PAGE</title>
        <style>
            body{
                background: url("/logo.jpeg");
                background-repeat: no-repeat;
                width: 100%;
                height: 100%;
            }
            nav{

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                border: none;
            
                
            }
            .div{
                border: 2px solid black;
                padding: 15px;      /* Padding inside the border */
                margin-top: 100px;
                border-radius: 15px;
                background:url("/logo1.jpeg");
                background-repeat: no-repeat;
                
            }
            
            table{
                border-spacing: 12px 12px;
                
            }p{
                text-align: center;
               
            }h1{
                color: rgb(156, 55, 224);
            }
        
  
        </style>
    </head>
    <body>
        <nav>
            <div class="div">
                <h1>WELCOME TO LOGIN PAGE</h1><br>
                <video autoplay loop muted playsinline width="100%" height="150px">
                    <source src="logo2.mp4" type="video/mp4">
                </video>
            <form action="/login" method="post">
                <table>
                    <tr>
                        <td style="font-size: 25px;">Email_ID</td>
                        <td colspan="2"><input type="text" name="l_email" placeholder="Enter eamil"  required style="width: 150%; height:27px"></td>
                    </tr>
                    <tr>
                        <td style="font-size: 25px;">Password</td>
                        <td colspan="2"><input type="password" name="l_pass" required style="width: 150%; height:27px"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="SUBMIT" style="height:30px; background-color: green;"></td>
                        <td><input type="reset"  value="RESET" style="height:30px; background-color: red;"></td>
                    </tr>
                </table>
            </form>
            <hr>
            <p>Don't have an accont? <a href="/register">Register here</a></p>
            </div>
        </nav>
    </body>
</html>
